syntax = "proto3";

package CTDSG_DPDK_V3;

option go_package = "miner/grpc-service/CTDSG_DPDK_V3";

service CTDSG_DPDK_V3 {
  // Get the current logged-in API user information.
  //
  // This is the first read-only MVP method. It authenticates through
  // POST /Login/uInterlogin when a cached token is not available, then calls
  // GET /Login/getUserInfo with Authorization and Lan headers.
  rpc GetUserInfo(GetUserInfoRequest) returns (GetUserInfoResponse) {}

  // Query read-only security event logs such as IPS, DDoS, AV, WAF, TI, WPP,
  // outbound, regional-access, and industrial-control logs.
  rpc QuerySecurityLog(SecurityLogRequest) returns (DpdkJsonResponse) {}

  // Query read-only user behavior logs such as web, email, IM, login,
  // file-outbound, session, alarm, and proxy-bypass logs.
  rpc QueryBehaviorLog(BehaviorLogRequest) returns (DpdkJsonResponse) {}

  // Query read-only protocol audit and system/jr audit logs.
  rpc QueryAuditLog(AuditLogRequest) returns (DpdkJsonResponse) {}

  // Query read-only security analytics such as IPS vulnerability statistics,
  // antivirus rankings, DDoS rankings, and proxy-bypass rankings.
  rpc QuerySecurityStatistic(SecurityStatisticRequest)
      returns (DpdkJsonResponse) {}

  // Query read-only traffic and behavior analytics by user, service, site,
  // terminal, location, or online equivalents.
  rpc QueryFlowAnalysis(FlowAnalysisRequest) returns (DpdkJsonResponse) {}

  // Query read-only resource metrics such as CPU, memory, sessions, online
  // users, and physical interfaces.
  rpc QueryResourceMetric(ResourceMetricRequest) returns (DpdkJsonResponse) {}

  // Query read-only selector/reference data used by reports.
  rpc QueryReferenceData(ReferenceDataRequest) returns (DpdkJsonResponse) {}

  // List read-only policy objects whose endpoints are documented as getList.
  rpc ListPolicyObjects(PolicyObjectListRequest) returns (DpdkJsonResponse) {}
}

message GetUserInfoRequest {
}

message UserInfo {
  string rid = 1;
  string uid = 2;
  string uname = 3;
}

message GetUserInfoResponse {
  int64 code = 1;
  string message = 2;
  UserInfo user = 3;
  int32 http_status = 4;
}

message DpdkQuery {
  uint32 page = 1;
  uint32 page_size = 2;
  string start_time = 3;
  string end_time = 4;
  string keyword = 5;
  string order = 6;
  // JSON object of documented filter fields only. Values may be scalar or a
  // bounded array of scalars. The service rejects nested objects.
  string filters_json = 7;
}

message DpdkJsonResponse {
  int64 code = 1;
  string message = 2;
  string data_json = 3;
  int32 http_status = 4;
  string upstream_path = 5;
}

