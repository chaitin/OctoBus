syntax = "proto3";

package google.protobuf;

option go_package = "google.golang.org/protobuf/types/known/wrapperspb";
option java_package = "com.google.protobuf";
option java_outer_classname = "WrappersProto";
option java_multiple_files = true;
option objc_class_prefix = "GPB";
option csharp_namespace = "Google.Protobuf.WellKnownTypes";

// Wrapper message for `double`.
//
// The result of hashing a `google.protobuf.DoubleValue` is the same
// as hashing the `value` field directly.
message DoubleValue {
  // The double value.
  double value = 1;
}

// Wrapper message for `float`.
//
// The result of hashing a `google.protobuf.FloatValue` is the same
// as hashing the `value` field directly.
message FloatValue {
  // The float value.
  float value = 1;
}

// Wrapper message for `int64`.
//
// The result of hashing a `google.protobuf.Int64Value` is the same
// as hashing the `value` field directly.
message Int64Value {
  // The int64 value.
  int64 value = 1;
}

// Wrapper message for `uint64`.
//
// The result of hashing a `google.protobuf.UInt64Value` is the same
// as hashing the `value` field directly.
message UInt64Value {
  // The uint64 value.
  uint64 value = 1;
}

// Wrapper message for `int32`.
//
// The result of hashing a `google.protobuf.Int32Value` is the same
// as hashing the `value` field directly.
message Int32Value {
  // The int32 value.
  int32 value = 1;
}

// Wrapper message for `uint32`.
//
// The result of hashing a `google.protobuf.UInt32Value` is the same
// as hashing the `value` field directly.
message UInt32Value {
  // The uint32 value.
  uint32 value = 1;
}

// Wrapper message for `bool`.
//
// The result of hashing a `google.protobuf.BoolValue` is the same
// as hashing the `value` field directly.
message BoolValue {
  // The bool value.
  bool value = 1;
}

// Wrapper message for `string`.
//
// The result of hashing a `google.protobuf.StringValue` is the same
// as hashing the `value` field directly.
message StringValue {
  // The string value.
  string value = 1;
}

// Wrapper message for `bytes`.
//
// The result of hashing a `google.protobuf.BytesValue` is the same
// as hashing the `value` field directly.
message BytesValue {
  // The bytes value.
  bytes value = 1;
}
